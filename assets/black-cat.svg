<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .float {
        animation: float 2.6s ease-in-out infinite;
        transform-origin: center;
      }

      .cat-fill {
        fill: #0b0b0f;
      }

      .cat-stroke {
        stroke: #f2f2f2;
        stroke-width: 3.4;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .eye {
        fill: #ff4fa3;
        stroke: #ffffff;
        stroke-width: 1.3;
      }

      .nose {
        fill: #ff8fcd;
      }

      .mouth {
        stroke: #ff8fcd;
        stroke-width: 2.7;
        stroke-linecap: round;
      }

      .ear-inner {
        fill: #2a1b26;
      }

      .whisker {
        stroke: #d8d8d8;
        stroke-width: 2;
        stroke-linecap: round;
        opacity: 0.9;
      }

      .paw-line {
        stroke: #f2f2f2;
        stroke-width: 2.4;
        stroke-linecap: round;
      }

      @keyframes float {
        0%, 100% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(-5px);
        }
      }
    </style>
  </defs>

  <rect width="180" height="180" fill="transparent"/>

  <g class="float">
