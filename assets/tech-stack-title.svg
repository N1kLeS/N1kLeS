<svg width="560" height="92" viewBox="0 0 560 92" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        font-size: 36px;
        font-weight: 700;
        fill: #ffffff;
      }

```
  .small {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 14px;
    font-weight: 500;
    fill: #ff5fbc;
  }

  .code {
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: 13px;
    font-weight: 600;
    fill: #ffffff;
  }

  .muted {
    fill: #8b949e;
  }

  .pink {
    fill: #ff1493;
  }

  .soft-pink {
    fill: #ff8fcd;
  }

  .bar-bg {
    fill: #30363d;
  }

  .bar-fill {
    fill: #ff1493;
  }

  .dot {
    fill: #ff5fbc;
  }

  .pulse {
    animation: pulse 1.6s ease-in-out infinite;
  }

  .blink {
    animation: blink 1s steps(2, start) infinite;
  }

  .fade-1 {
    animation: fade1 6s ease-in-out infinite;
  }

  .fade-2 {
    animation: fade2 6s ease-in-out infinite;
  }

  .fade-3 {
    animation: fade3 6s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% {
      opacity: 0.35;
      transform: scale(1);
    }

    50% {
      opacity: 1;
      transform: scale(1.18);
    }
  }

  @keyframes blink {
    0%, 45% {
      opacity: 1;
    }

    46%, 100% {
      opacity: 0;
    }
  }

  @keyframes fade1 {
    0%, 28% {
      opacity: 1;
    }

    33%, 100% {
      opacity: 0;
    }
  }

  @keyframes fade2 {
    0%, 28% {
      opacity: 0;
    }

    33%, 61% {
      opacity: 1;
    }

    66%, 100% {
      opacity: 0;
    }
  }

  @keyframes fade3 {
    0%, 61% {
      opacity: 0;
    }

    66%, 94% {
      opacity: 1;
    }

    100% {
      opacity: 0;
    }
  }
</style>
```

  </defs>

  <rect width="560" height="92" fill="transparent"/>

<text x="0" y="36" class="title">Tech stack</text>

<text x="3" y="62" class="small">loading new skills</text>

  <circle cx="128" cy="57" r="3" class="dot pulse"/>
  <circle cx="140" cy="57" r="3" class="dot pulse" style="animation-delay: 0.18s;"/>
  <circle cx="152" cy="57" r="3" class="dot pulse" style="animation-delay: 0.36s;"/>

  <g transform="translate(230 21)">
    <text x="0" y="0" class="code muted">&gt;</text>

```
<g class="fade-1">
  <text x="20" y="0" class="code">
    stack.load(
    <tspan class="pink">Java</tspan>,
    <tspan class="pink">Python</tspan>
    )
  </text>
</g>

<g class="fade-2">
  <text x="20" y="0" class="code">
    stack.learn(
    <tspan class="pink">Docker</tspan>,
    <tspan class="pink">Gradle</tspan>
    )
  </text>
</g>

<g class="fade-3">
  <text x="20" y="0" class="code">
    stack.update(
    <tspan class="pink">Backend</tspan>,
    <tspan class="pink">Tests</tspan>
    )
  </text>
</g>

<rect x="315" y="-13" width="8" height="17" class="soft-pink blink"/>
```

  </g>

  <g transform="translate(230 45)">
    <rect x="0" y="0" width="270" height="10" rx="5" class="bar-bg"/>

```
<rect x="0" y="0" width="0" height="10" rx="5" class="bar-fill">
  <animate
    attributeName="width"
    values="0;75;150;220;270;0"
    keyTimes="0;0.22;0.45;0.68;0.88;1"
    dur="6s"
    repeatCount="indefinite"/>
</rect>

<rect x="0" y="0" width="270" height="10" rx="5" fill="none" stroke="#ff8fcd" stroke-opacity="0.35"/>
```

  </g>

  <g transform="translate(230 68)">
    <rect x="0" y="0" width="38" height="8" rx="4" fill="#ff1493" opacity="0.35">
      <animate attributeName="opacity" values="0.25;1;0.25" dur="1.8s" repeatCount="indefinite"/>
    </rect>

```
<rect x="48" y="0" width="56" height="8" rx="4" fill="#ff1493" opacity="0.35">
  <animate attributeName="opacity" values="0.25;1;0.25" dur="1.8s" begin="0.25s" repeatCount="indefinite"/>
</rect>

<rect x="114" y="0" width="42" height="8" rx="4" fill="#ff1493" opacity="0.35">
  <animate attributeName="opacity" values="0.25;1;0.25" dur="1.8s" begin="0.5s" repeatCount="indefinite"/>
</rect>

<rect x="166" y="0" width="64" height="8" rx="4" fill="#ff1493" opacity="0.35">
  <animate attributeName="opacity" values="0.25;1;0.25" dur="1.8s" begin="0.75s" repeatCount="indefinite"/>
</rect>
