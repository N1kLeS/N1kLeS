<svg width="320" height="120" viewBox="0 0 320 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bubble {
        fill: #11111a;
        stroke: #ff8fcd;
        stroke-width: 3;
      }

      .letter {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        font-size: 44px;
        font-weight: 800;
        fill: #ffffff;
      }

      .pink {
        fill: #ff4fa3;
      }

      .wave-a {
        animation: waveA 1.5s ease-in-out infinite;
        transform-box: fill-box;
        transform-origin: center bottom;
      }

      .wave-b {
        animation: waveB 1.5s ease-in-out infinite;
        transform-box: fill-box;
        transform-origin: center bottom;
      }

      .wave-c {
        animation: waveC 1.5s ease-in-out infinite;
        transform-box: fill-box;
        transform-origin: center bottom;
      }

      .wave-d {
        animation: waveD 1.5s ease-in-out infinite;
        transform-box: fill-box;
        transform-origin: center bottom;
      }

      @keyframes waveA {
        0%, 100% {
          transform: translateY(0);
        }

        25% {
          transform: translateY(-10px);
        }

        50% {
          transform: translateY(0);
        }

        75% {
          transform: translateY(6px);
        }
      }

      @keyframes waveB {
        0%, 100% {
          transform: translateY(5px);
        }

        25% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(-10px);
        }

        75% {
          transform: translateY(0);
        }
      }

      @keyframes waveC {
        0%, 100% {
          transform: translateY(0);
        }

        25% {
          transform: translateY(6px);
        }

        50% {
          transform: translateY(0);
        }

        75% {
          transform: translateY(-10px);
        }
      }

      @keyframes waveD {
        0%, 100% {
          transform: translateY(-10px);
        }

        25% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(5px);
        }

        75% {
          transform: translateY(0);
        }
      }
    </style>
  </defs>

  <rect width="320" height="120" fill="transparent"/>

  <path d="M19 22C19 14.82 24.82 9 32 9H288C295.18 9 301 14.82 301 22V73C301 80.18 295.18 86 288 86H122L92 109L99 86H32C24.82 86 19 80.18 19 73V22Z" class="bubble"/>

  <g class="wave-a">
    <text x="56" y="61" class="letter pink">M</text>
  </g>
  <g class="wave-b">
    <text x="108" y="61" class="letter">E</text>
  </g>
  <g class="wave-c">
    <text x="151" y="61" class="letter pink">O</text>
  </g>
  <g class="wave-d">
    <text x="203" y="61" class="letter">W</text>
  </g>
</svg>
