<svg width="900" height="100" viewBox="0 0 900 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="hotPinkGlow" x="-80%" y="-180%" width="260%" height="460%">
      <feGaussianBlur stdDeviation="4.5" result="softGlow"/>
      <feColorMatrix
        in="softGlow"
        type="matrix"
        values="
          1 0 0 0 0
          0 0.12 0 0 0
          0 0 0.55 0 0
          0 0 0 1 0"
        result="pinkGlow"/>
      <feMerge>
        <feMergeNode in="pinkGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

```
<filter id="alivePink" x="-80%" y="-180%" width="260%" height="460%">
  <feMorphology in="SourceGraphic" operator="dilate" radius="0.45" result="thick">
    <animate
      attributeName="radius"
      values="0.15;0.65;0.35;0.15"
      dur="1.4s"
      repeatCount="indefinite"/>
  </feMorphology>

  <feGaussianBlur in="thick" stdDeviation="1.4" result="blurred"/>
  <feMerge>
    <feMergeNode in="blurred"/>
    <feMergeNode in="SourceGraphic"/>
  </feMerge>
</filter>

<linearGradient id="diagonalBand" x1="0%" y1="0%" x2="100%" y2="0%">
  <stop offset="0%" stop-color="black" stop-opacity="0"/>
  <stop offset="16%" stop-color="white" stop-opacity="0.05"/>
  <stop offset="32%" stop-color="white" stop-opacity="0.45"/>
  <stop offset="48%" stop-color="white" stop-opacity="1"/>
  <stop offset="52%" stop-color="white" stop-opacity="1"/>
  <stop offset="68%" stop-color="white" stop-opacity="0.45"/>
  <stop offset="84%" stop-color="white" stop-opacity="0.05"/>
  <stop offset="100%" stop-color="black" stop-opacity="0"/>
</linearGradient>

<mask id="movingMask" maskUnits="userSpaceOnUse" x="-300" y="-100" width="1500" height="300">
  <rect x="-300" y="-100" width="1500" height="300" fill="black"/>
  <g transform="rotate(-18 450 50)">
    <rect x="-560" y="-80" width="250" height="260" fill="url(#diagonalBand)">
      <animate
        attributeName="x"
        from="-560"
        to="1210"
        dur="7.4s"
        repeatCount="indefinite"/>
    </rect>
  </g>
</mask>

<style>
  .titleBase {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 42px;
    font-weight: 700;
    letter-spacing: 0.2px;
    fill: #ffffff;
  }

  .titlePink {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 42px;
    font-weight: 700;
    letter-spacing: 0.2px;
    fill: #ff3ea5;
  }

  .titlePinkCore {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 42px;
    font-weight: 700;
    letter-spacing: 0.2px;
    fill: #ff8ad2;
  }
</style>

```

  </defs>

  <rect width="900" height="100" fill="transparent"/>

  <!-- Белый основной текст -->

<text
 x="450"
 y="56"
 text-anchor="middle"
 dominant-baseline="middle"
 class="titleBase">
Hi there, I'm Nikita / N1kLeS </text>

