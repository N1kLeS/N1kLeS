<mask id="movingMask" maskUnits="userSpaceOnUse" x="-400" y="-140" width="1700" height="380">
  <rect x="-400" y="-140" width="1700" height="380" fill="black"/>

  <g transform="rotate(-18 450 50)">
    <g>
      <animateTransform
        attributeName="transform"
        type="translate"
        from="0 0"
        to="520 0"
        dur="5.6s"
        repeatCount="indefinite"/>

      <rect x="-1300" y="-120" width="360" height="320" fill="url(#fillBand)"/>
      <rect x="-780"  y="-120" width="360" height="320" fill="url(#fillBand)"/>
      <rect x="-260"  y="-120" width="360" height="320" fill="url(#fillBand)"/>
      <rect x="260"   y="-120" width="360" height="320" fill="url(#fillBand)"/>
      <rect x="780"   y="-120" width="360" height="320" fill="url(#fillBand)"/>
      <rect x="1300"  y="-120" width="360" height="320" fill="url(#fillBand)"/>
    </g>
  </g>
</mask>

