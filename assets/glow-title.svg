<svg width="900" height="90" viewBox="0 0 900 90" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pinkGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff4fd8">
        <animate attributeName="stop-color"
                 values="#ff4fd8;#ff9ef6;#ff4fd8"
                 dur="3s"
                 repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#ffffff">
        <animate attributeName="stop-color"
                 values="#ffffff;#ffb3f1;#ffffff"
                 dur="3s"
                 repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#ff2fbf">
        <animate attributeName="stop-color"
                 values="#ff2fbf;#ff7ee7;#ff2fbf"
                 dur="3s"
                 repeatCount="indefinite"/>
      </stop>
    </linearGradient>

```
<filter id="pinkGlow" x="-40%" y="-80%" width="180%" height="260%">
  <feGaussianBlur stdDeviation="3" result="blur"/>
  <feColorMatrix in="blur" type="matrix"
    values="1 0 0 0 1
            0 0.2 0 0 0
            0 0 1 0 0.8
            0 0 0 1 0"/>
  <feMerge>
    <feMergeNode/>
    <feMergeNode in="SourceGraphic"/>
  </feMerge>
</filter>

<style>
  .title {
    font-family: "JetBrains Mono", "Fira Code", "Segoe UI", monospace;
    font-size: 42px;
    font-weight: 800;
    letter-spacing: 0.5px;
    filter: url(#pinkGlow);
  }

  .pulse {
    animation: pulseShake 3s ease-in-out infinite;
    transform-origin: center;
    transform-box: fill-box;
  }

  @keyframes pulseShake {
    0%, 100% {
      transform: scale(1) translate(0, 0);
    }

    42% {
      transform: scale(1.018) translate(0, 0);
    }

    46% {
      transform: scale(1.022) translate(0.8px, -0.4px);
    }

    50% {
      transform: scale(1.012) translate(-0.7px, 0.4px);
    }

    54% {
      transform: scale(1.018) translate(0.4px, 0);
    }

    62% {
      transform: scale(1) translate(0, 0);
    }
  }
</style>
