<svg width="900" height="90" viewBox="0 0 900 90" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="movingGlow" x1="-100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="45%" stop-color="#b83280" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#c84a93" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#b83280" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent"/>

```
  <animate
    attributeName="x1"
    values="-100%;100%"
    dur="3.2s"
    repeatCount="indefinite"/>

  <animate
    attributeName="x2"
    values="0%;200%"
    dur="3.2s"
    repeatCount="indefinite"/>
</linearGradient>

<filter id="softPinkGlow" x="-40%" y="-100%" width="180%" height="300%">
  <feGaussianBlur stdDeviation="4" result="blur"/>
  <feColorMatrix
    in="blur"
    type="matrix"
    values="
      0.75 0    0    0 0.18
      0    0.18 0    0 0.03
      0    0    0.55 0 0.25
      0    0    0    1 0
    "
    result="pinkBlur"/>
  <feMerge>
    <feMergeNode in="pinkBlur"/>
    <feMergeNode in="SourceGraphic"/>
  </feMerge>
</filter>

<style>
  .title {
    font-family: "JetBrains Mono", "Fira Code", "Segoe UI", monospace;
    font-size: 42px;
    font-weight: 800;
    letter-spacing: 0.5px;
    fill: white;
  }

  .glow-text {
    font-family: "JetBrains Mono", "Fira Code", "Segoe UI", monospace;
    font-size: 42px;
    font-weight: 800;
    letter-spacing: 0.5px;
    fill: url(#movingGlow);
    filter: url(#softPinkGlow);
  }

  .pulse {
    animation: pulseShake 3.2s ease-in-out infinite;
    transform-origin: center;
    transform-box: fill-box;
  }

  @keyframes pulseShake {
    0%, 100% {
      transform: scale(1) translate(0, 0);
    }

    43% {
      transform: scale(1.01) translate(0, 0);
    }

    47% {
      transform: scale(1.014) translate(0.5px, -0.3px);
    }

    51% {
      transform: scale(1.008) translate(-0.4px, 0.3px);
    }

    56% {
      transform: scale(1.01) translate(0.2px, 0);
    }

    64% {
      transform: scale(1) translate(0, 0);
    }
  }
</style>
```

  </defs>

  <rect width="900" height="90" fill="transparent"/>

  <g class="pulse">
    <text
      x="450"
      y="48"
      text-anchor="middle"
      dominant-baseline="middle"
      class="glow-text">
      Hi there, I'm Nikita / N1kLeS
    </text>

