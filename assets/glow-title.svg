  <g mask="url(#movingMask)">
    <text
      x="450"
      y="56"
      text-anchor="middle"
      dominant-baseline="middle"
      class="titlePink"
      filter="url(#hotPinkGlow)">
      Hi there, I'm Nikita / N1kLeS
    </text>

