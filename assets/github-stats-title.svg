<svg width="340" height="76" viewBox="0 0 340 76" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .letter {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        font-size: 34px;
        font-weight: 700;
        fill: #ffffff;
        text-rendering: geometricPrecision;
      }

      .a,
      .b {
        transform-box: fill-box;
        transform-origin: center bottom;
      }

      .a {
        animation: squashA 2.2s ease-in-out infinite;
      }

      .b {
        animation: squashB 2.2s ease-in-out infinite;
      }

      @keyframes squashA {
        0%   { transform: scale(1.10, 0.72); }
        25%  { transform: scale(0.96, 1.02); }
        50%  { transform: scale(1.10, 0.72); }
        75%  { transform: scale(0.96, 1.02); }
        100% { transform: scale(1.10, 0.72); }
      }

      @keyframes squashB {
        0%   { transform: scale(0.96, 1.02); }
        25%  { transform: scale(1.10, 0.72); }
        50%  { transform: scale(0.96, 1.02); }
        75%  { transform: scale(1.10, 0.72); }
        100% { transform: scale(0.96, 1.02); }
      }
    </style>
  </defs>

  <rect width="340" height="76" fill="transparent"/>

  <g transform="translate(0 50)">
    <g class="a"><text class="letter" x="0"   y="0">G</text></g>
    <g class="b"><text class="letter" x="24"  y="0">i</text></g>
    <g class="a"><text class="letter" x="35"  y="0">t</text></g>
    <g class="b"><text class="letter" x="49"  y="0">H</text></g>
    <g class="a"><text class="letter" x="75"  y="0">u</text></g>
    <g class="b"><text class="letter" x="97"  y="0">b</text></g>

    <g class="a"><text class="letter" x="139" y="0">s</text></g>
    <g class="b"><text class="letter" x="159" y="0">t</text></g>
    <g class="a"><text class="letter" x="173" y="0">a</text></g>
    <g class="b"><text class="letter" x="195" y="0">t</text></g>
    <g class="a"><text class="letter" x="209" y="0">s</text></g>
  </g>
</svg>
