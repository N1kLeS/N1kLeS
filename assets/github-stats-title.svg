<svg width="440" height="80" viewBox="0 0 440 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="pinkGlow" x="-80%" y="-140%" width="260%" height="380%">
      <feGaussianBlur stdDeviation="2.8" result="blur"/>
      <feColorMatrix
        in="blur"
        type="matrix"
        values="
          1 0 0 0 0
          0 0.18 0 0 0
          0 0 0.55 0 0
          0 0 0 0.9 0"
        result="pinkBlur"/>
      <feMerge>
        <feMergeNode in="pinkBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

